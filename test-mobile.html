<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=980,initial-scale=1">
<title>手机窗口模拟 — 武侠模拟器</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    padding: 20px;
  }
  .phone-frame {
    width: 420px;
    height: 90vh;
    max-height: 860px;
    background: #000;
    border-radius: 32px;
    box-shadow: 0 0 40px rgba(0,0,0,.7), 0 0 80px rgba(100,100,255,.15);
    overflow: hidden;
    position: relative;
    border: 3px solid #333;
  }
  .phone-notch {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 24px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 29px;
    background: #0a0a1a;
  }
  .hint {
    color: rgba(255,255,255,.45);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  .controls {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .controls button {
    padding: 6px 16px;
    background: rgba(255,255,255,.1);
    color: #ccc;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .controls button:hover { background: rgba(255,255,255,.18); color:#fff; }
</style>
</head>
<body>

<div class="controls">
  <button onclick="reloadIframe()">🔄 刷新</button>
  <button onclick="toggleViewport()">📱 切换视口</button>
  <button onclick="openDirect()">↗️ 新窗口打开</button>
</div>

<div class="phone-frame" id="frame">
  <div class="phone-notch"></div>
  <iframe id="gameFrame" src="index.html"></iframe>
</div>
<div class="hint">模拟手机窗口 420×860px｜点击右侧按钮可切换视口大小</div>

<script>
let isSmall = false;
function reloadIframe() {
  document.getElementById('gameFrame').src = document.getElementById('gameFrame').src;
}
function toggleViewport() {
  const frame = document.getElementById('frame');
  if (!isSmall) {
    frame.style.width = '375px';
    frame.style.height = '667px';
    isSmall = true;
  } else {
    frame.style.width = '420px';
    frame.style.height = '90vh';
    isSmall = false;
  }
}
function openDirect() {
  window.open('index.html', '_blank', 'width=420,height=900');
}
// 自动注入 mobile-viewport class
const iframe = document.getElementById('gameFrame');
iframe.addEventListener('load', () => {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (doc && !doc.body.classList.contains('mobile-viewport')) {
      doc.body.classList.add('mobile-viewport');
      // 强制触发 resize
      iframe.contentWindow.dispatchEvent(new Event('resize'));
    }
  } catch(e) { /* CORS — 同源可注入，异源不行 */ }
});
</script>
</body>
</html>
